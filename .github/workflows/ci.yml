name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-website:
    name: Build Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Install dependencies (website)
        run: pnpm -C website install

      - name: Typecheck (website)
        run: pnpm -C website typecheck

      - name: Build (website)
        run: pnpm -C website build
