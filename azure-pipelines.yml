trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  NodeVersion: "20.x"
  PNPM_CACHE_FOLDER: '$(Pipeline.Workspace)\\.pnpm-store'
  ELECTRON_CACHE: '$(Pipeline.Workspace)\\.electron-cache'
  ELECTRON_BUILDER_CACHE: '$(Pipeline.Workspace)\\.electron-builder-cache'
  # Set these as pipeline variables or variable-group secrets:
  #   AzureServiceConnection – name of the Azure service connection
  #   StorageAccountName     – Azure Storage account name
  #   StorageResourceGroup   – Azure resource group
  #   StorageContainerName   – blob container (e.g. "$web")
  #   StorageBlobPrefix      – optional blob prefix

pool:
  vmImage: "windows-latest"

steps:
  - checkout: self
    clean: true

  - task: NodeTool@0
    inputs:
      versionSpec: "$(NodeVersion)"
    displayName: "Use Node.js $(NodeVersion)"

  - script: |
      corepack enable
      corepack prepare pnpm@8.12.1 --activate
    displayName: "Enable pnpm via corepack"

  - task: Cache@2
    inputs:
      key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
      restoreKeys: |
        pnpm | "$(Agent.OS)"
      path: "$(PNPM_CACHE_FOLDER)"
    displayName: "Cache pnpm store"

  - script: |
      pnpm config set store-dir $(PNPM_CACHE_FOLDER)
      pnpm install --frozen-lockfile
    displayName: "Install dependencies with pnpm"

  - script: |
      pnpm --filter @sqlhelper/renderer install --frozen-lockfile
      pnpm --filter @sqlhelper/desktop install --frozen-lockfile
    displayName: "Ensure workspace package installs"

  - script: |
      pnpm --filter @sqlhelper/renderer build
      pnpm --filter @sqlhelper/desktop build
    displayName: "Build renderer and desktop bundles"

  - script: |
      pnpm --filter @sqlhelper/desktop exec -- electron-rebuild -f -w better-sqlite3,keytar
    displayName: "Rebuild native modules for Windows"
    env:
      ELECTRON_CACHE: $(ELECTRON_CACHE)
      ELECTRON_BUILDER_CACHE: $(ELECTRON_BUILDER_CACHE)

  - script: |
      node apps/desktop/scripts/prepare-workspace-modules.mjs
    displayName: "Prepare packaged workspace modules"

  - task: Cache@2
    inputs:
      key: 'electron-builder | "$(Agent.OS)"'
      path: |
        $(ELECTRON_CACHE)
        $(ELECTRON_BUILDER_CACHE)
    displayName: "Cache Electron build artifacts"

  - script: |
      pnpm --filter @sqlhelper/desktop exec -- electron-builder --win nsis portable --x64 --arm64 --publish never
    displayName: "Build Windows installers (NSIS + Portable, x64 + arm64)"
    env:
      ELECTRON_CACHE: $(ELECTRON_CACHE)
      ELECTRON_BUILDER_CACHE: $(ELECTRON_BUILDER_CACHE)

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: "release"
      ArtifactName: "windows"
      publishLocation: "Container"
    displayName: "Publish Windows release artifacts"

  - task: AzureFileCopy@6
    displayName: "Upload release artifacts to Azure Blob Storage (root for updates)"
    condition: succeeded()
    inputs:
      SourcePath: "$(System.DefaultWorkingDirectory)/release"
      azureSubscription: "$(AzureServiceConnection)"
      Destination: "AzureBlob"
      storage: "$(StorageAccountName)"
      ResourceGroup: "$(StorageResourceGroup)"
      ContainerName: "$(StorageContainerName)"
      BlobPrefix: "" # upload to container root so generic updater can find latest.yml at base URL

  - task: AzureFileCopy@6
    displayName: "Upload release artifacts to Azure Blob Storage (versioned archive)"
    condition: succeeded()
    inputs:
      SourcePath: "$(System.DefaultWorkingDirectory)/release"
      azureSubscription: "$(AzureServiceConnection)"
      Destination: "AzureBlob"
      storage: "$(StorageAccountName)"
      ResourceGroup: "$(StorageResourceGroup)"
      ContainerName: "$(StorageContainerName)"
      BlobPrefix: "windows/$(Build.BuildNumber)"
